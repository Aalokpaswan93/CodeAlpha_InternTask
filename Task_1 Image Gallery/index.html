<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Image Gallery</h1>

<!-- Category Buttons -->
<div class="filter-buttons">
    <button class="active" data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
    <button data-filter="technology">Technology</button>
</div>

<div class="gallery">

    <img src="https://picsum.photos/id/1015/600/400" class="nature" alt="">
    <img src="https://picsum.photos/id/1016/600/400" class="nature" alt="">

    <img src="https://picsum.photos/id/1011/600/400" class="city" alt="">
    <img src="https://picsum.photos/id/1031/600/400" class="city" alt="">

    <img src="https://picsum.photos/id/1024/600/400" class="animals" alt="">
    <img src="https://picsum.photos/id/1025/600/400" class="animals" alt="">

    <img src="https://picsum.photos/id/180/600/400" class="technology" alt="">
    <img src="https://picsum.photos/id/201/600/400" class="technology" alt="">

    <img src="https://picsum.photos/id/1043/600/400" class="nature" alt="">
    <img src="https://picsum.photos/id/1050/600/400" class="city" alt="">

</div>

    <!-- Lightbox -->
    <div class="lightbox">
        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-img" src="" alt="">

        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
